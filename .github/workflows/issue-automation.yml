name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Triage Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labelsToAdd = ['needs-triage'];
            
            // Add category labels based on title
            if (title.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }
            
            // Add priority labels (highest priority first)
            const priorityKeywords = [
              { keywords: ['critical', 'urgent', 'production', 'outage'], label: 'priority-critical' },
              { keywords: ['important', 'high', 'blocking'], label: 'priority-high' },
              { keywords: ['medium', 'normal'], label: 'priority-medium' },
              { keywords: ['low', 'nice-to-have', 'minor'], label: 'priority-low' }
            ];
            
            let priorityAdded = false;
            for (const { keywords, label } of priorityKeywords) {
              if (keywords.some(k => title.includes(k) || body.includes(k))) {
                labelsToAdd.push(label);
                priorityAdded = true;
                break;
              }
            }
            if (!priorityAdded) {
              labelsToAdd.push('priority-medium');
            }
            
            // Add labels to issue
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: labelsToAdd
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Create Epic Subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const originalTitle = issue.title;
            const subtasks = [
              { name: 'Requirements Analysis' },
              { name: 'Design and Architecture' },
              { name: 'Implementation' },
              { name: 'Testing and Documentation' }
            ];
            
            const subtaskNumbers = [];
            
            // Create each subtask
            for (let i = 0; i < subtasks.length; i++) {
              const task = subtasks[i];
              const subtaskTitle = `[SUBTASK] ${originalTitle} - Task ${i+1}: ${task.name}`;
              const subtaskBody = `Related to #${issue.number}`;
              
              const subtask = await github.rest.issues.create({
                owner: issue.owner,
                repo: issue.repo,
                title: subtaskTitle,
                body: subtaskBody,
                labels: ['enhancement', 'needs-review']
              });
              
              subtaskNumbers.push(subtask.data.number);
            }
            
            // Update parent issue body with checklist
            const checklist = subtaskNumbers.map(num => `- [ ] #${num}`).join('\n');
            const newBody = (issue.body || '') + `\n\n## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: [issue-triage, task-breakdown]
    steps:
      - name: Check First Time Contributor
        id: first-time
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const author = issue.user.login;
            
            // Get all issues by the author in this repo
            const issues = await github.rest.issues.listForRepo({
              owner: issue.owner,
              repo: issue.repo,
              creator: author,
              state: 'all'
            });
            
            // Check if this is their first issue
            const isFirst = issues.data.length === 1;
            return isFirst;
          result-encoding: json

      - name: Add First Time Label and Welcome
        if: steps.first-time.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            
            // Add first-time-contributor label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['first-time-contributor']
            });
            
            // Post welcome message
            await github.rest.issues.createComment({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              body: `Welcome to the repository, @${issue.user.login}! This is your first issue here. We appreciate your contribution and will review it soon.`
            });

      - name: Post Type-Specific Response
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            const labels = issue.labels.map(l => l.name.toLowerCase());
            let commentBody = '';
            
            // Determine response based on category label
            if (labels.includes('bug')) {
              commentBody = '### Bug Report Guidelines\nPlease ensure you have provided all necessary details (steps to reproduce, expected behavior, environment) to help us investigate this bug efficiently.';
            } else if (labels.includes('epic')) {
              commentBody = '### Feature Request Process\nThis epic will be broken down into subtasks for implementation. We will review the requirements and provide updates soon.';
            } else if (labels.includes('maintenance')) {
              commentBody = '### Maintenance Guidelines\nPlease ensure all maintenance tasks are clearly outlined and their impact is documented. We will review this request shortly.';
            }
            
            // Post comment if there's content
            if (commentBody) {
              await github.rest.issues.createComment({
                owner: issue.owner,
                repo: issue.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }

      - name: Set Milestone for High/Critical Priority
        if: contains(github.event.issue.labels.*.name, 'priority-high') || contains(github.event.issue.labels.*.name, 'priority-critical')
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            
            // Get or create milestone v1.0.0
            let milestone = await github.rest.issues.listMilestones({
              owner: issue.owner,
              repo: issue.repo,
              state: 'open',
              per_page: 100
            });
            
            let milestoneId = milestone.data.find(m => m.title === 'v1.0.0')?.id;
            
            if (!milestoneId) {
              // Create milestone if it doesn't exist
              const newMilestone = await github.rest.issues.createMilestone({
                owner: issue.owner,
                repo: issue.repo,
                title: 'v1.0.0',
                state: 'open'
              });
              milestoneId = newMilestone.data.id;
            }
            
            // Assign milestone to issue
            await github.rest.issues.update({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              milestone: milestoneId
            });

      - name: Update Status to Needs Review
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue;
            
            // Remove needs-triage label
            await github.rest.issues.removeLabel({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              name: 'needs-triage'
            });
            
            // Add needs-review label
            await github.rest.issues.addLabels({
              owner: issue.owner,
              repo: issue.repo,
              issue_number: issue.number,
              labels: ['needs-review']
            });